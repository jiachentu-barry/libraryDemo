<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>天下图书</title>
  <style>
    :root {
      --bg-1: #f5f0e8;
      --bg-2: #e6efe9;
      --paper: #fffdf8;
      --ink: #1e2318;
      --subtle: #65705a;
      --line: #d5cdb8;
      --accent: #2a6247;
      --accent-2: #1a4a33;
      --accent-light: #e8f4ee;
      --gold: #b8860b;
      --gold-light: #fdf3d0;
      --warn: #9d5b2c;
      --danger: #bb3f3f;
      --radius: 14px;
      --shadow: 0 4px 24px rgba(30, 35, 24, 0.09);
      --shadow-lg: 0 8px 32px rgba(30, 35, 24, 0.13);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      font-family: "Noto Serif SC", "Microsoft YaHei", serif;
      background:
        radial-gradient(ellipse at 10% 0%, #ede1c8 0 18%, transparent 19%),
        radial-gradient(ellipse at 90% 5%, #c8dfd0 0 22%, transparent 23%),
        linear-gradient(160deg, var(--bg-1) 0%, var(--bg-2) 100%);
      min-height: 100vh;
    }

    /* ── Header ── */
    .site-header {
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, var(--accent-2) 0%, var(--accent) 60%, #3d8b62 100%);
      color: #fff;
      padding: 28px 0 22px;
      margin-bottom: 24px;
      box-shadow: 0 4px 20px rgba(26, 74, 51, 0.3);
    }

    .site-header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 30px,
        rgba(255,255,255,0.03) 30px,
        rgba(255,255,255,0.03) 60px
      );
    }

    .site-header-inner {
      position: relative;
      width: min(1100px, 94vw);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .site-title {
      margin: 0;
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .site-title-sub {
      margin: 4px 0 0;
      font-size: 0.88rem;
      opacity: 0.8;
      letter-spacing: 0.04em;
    }

    .site-nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .site-nav a {
      color: rgba(255,255,255,0.92);
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 600;
      padding: 6px 14px;
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 999px;
      transition: background 220ms, color 220ms;
      letter-spacing: 0.02em;
    }

    .site-nav a:hover {
      background: rgba(255,255,255,0.18);
      color: #fff;
    }

    .site-nav-home {
      background: linear-gradient(180deg, #f4d97d 0%, #d4a33a 100%);
      border-color: rgba(255, 236, 181, 0.92);
      color: #3b2a08;
      font-weight: 800;
      box-shadow: 0 8px 18px rgba(116, 78, 10, 0.24);
    }

    .site-nav-home:hover {
      background: linear-gradient(180deg, #f7e3a1 0%, #dda940 100%);
      color: #fff;
    }

    .nav-user {
      display: inline-flex;
      align-items: center;
      padding: 6px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.28);
      color: #fff;
      font-size: 0.88rem;
      font-weight: 700;
    }

    .nav-logout {
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 999px;
      padding: 6px 14px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      font: inherit;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
    }

    .nav-logout:hover {
      background: rgba(255,255,255,0.18);
    }

    /* ── Layout ── */
    .wrap {
      width: min(1100px, 94vw);
      margin: 0 auto 40px;
    }

    .content {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 20px;
      align-items: start;
    }

    /* ── Panel ── */
    .panel {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
    }

    .panel-sticky {
      position: sticky;
      top: 20px;
      max-height: calc(100vh - 40px);
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--line) transparent;
    }

    /* ── Section titles ── */
    .section-title {
      margin: 0 0 4px;
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title::before {
      content: '';
      display: inline-block;
      width: 4px;
      height: 1.1em;
      background: var(--accent);
      border-radius: 2px;
      flex-shrink: 0;
    }

    .section-divider {
      border: none;
      border-top: 1px solid var(--line);
      margin: 18px 0 16px;
    }

    .section-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .section-title-row .section-title {
      margin: 0;
    }

    .refresh-btn {
      font: inherit;
      font-size: 0.76rem;
      padding: 3px 10px;
      border: 1px solid var(--accent);
      border-radius: 999px;
      background: var(--accent-light);
      color: var(--accent);
      cursor: pointer;
      font-weight: 600;
      transition: background 200ms, color 200ms;
    }

    .refresh-btn:hover {
      background: var(--accent);
      color: #fff;
    }

    .section-sub {
      margin: 0 0 12px;
      color: var(--subtle);
      font-size: 0.82rem;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin: 8px 0 14px;
    }

    .stat-card {
      background: linear-gradient(160deg, #ffffff 0%, #f4f9f6 100%);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      min-height: 80px;
    }

    .stat-label {
      font-size: 0.75rem;
      color: var(--subtle);
      margin: 0 0 6px;
    }

    .stat-value {
      margin: 0;
      font-size: 1.16rem;
      font-weight: 800;
      color: var(--accent-2);
      line-height: 1.3;
      word-break: break-word;
    }

    .stat-meta {
      margin: 4px 0 0;
      font-size: 0.76rem;
      color: var(--subtle);
    }

    .search-row {
      margin: 10px 0 14px;
    }

    .review-box {
      margin: 8px 0 16px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: linear-gradient(160deg, #fffefc 0%, #f7f4ec 100%);
      padding: 12px;
    }

    .review-form {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr 1.2fr auto;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }

    .review-form select,
    .review-form input,
    .review-form button {
      font: inherit;
      border-radius: 10px;
    }

    .review-form select,
    .review-form input {
      height: 36px;
      border: 1px solid var(--line);
      padding: 0 10px;
      background: #fff;
      color: var(--ink);
      min-width: 0;
    }

    .review-form button {
      height: 36px;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      padding: 0 14px;
      cursor: pointer;
      white-space: nowrap;
    }

    .review-form button:hover {
      background: var(--accent-2);
    }

    .review-list {
      display: grid;
      gap: 8px;
    }

    .review-item {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      padding: 8px 10px;
    }

    .review-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 4px;
      font-size: 0.84rem;
      color: var(--subtle);
    }

    .review-book {
      font-weight: 700;
      color: var(--ink);
    }

    .review-comment {
      margin: 0;
      font-size: 0.84rem;
      line-height: 1.6;
      color: var(--ink);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .book-detail-review-box {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
    }

    .book-detail-review-box .review-form {
      grid-template-columns: 0.7fr 1.6fr auto;
      margin-bottom: 12px;
    }

    .book-detail-review-box .section-sub {
      margin-bottom: 10px;
    }

    .search-input {
      width: 100%;
      height: 38px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      outline: none;
      transition: border-color 180ms, box-shadow 180ms;
    }

    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(42, 98, 71, 0.12);
    }

    /* ── Announcement ── */
    .announcement-item {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 11px 13px;
      margin-bottom: 8px;
      cursor: pointer;
      user-select: none;
      transition: border-color 200ms, box-shadow 200ms;
    }

    .announcement-item:hover {
      border-color: var(--accent);
      box-shadow: 0 2px 10px rgba(42, 98, 71, 0.1);
    }

    .announcement-item.open {
      border-color: var(--accent);
      background: var(--accent-light);
    }

    .announcement-item h3 {
      margin: 0 0 3px;
      font-size: 0.92rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      line-height: 1.4;
    }

    .announcement-title-text {
      flex: 1;
      min-width: 0;
    }

    .announcement-toggle {
      font-size: 0.72rem;
      color: var(--accent);
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
      margin-top: 2px;
      background: var(--accent-light);
      padding: 1px 7px;
      border-radius: 999px;
      border: 1px solid rgba(42,98,71,0.2);
    }

    .announcement-meta {
      margin: 0;
      color: var(--subtle);
      font-size: 0.78rem;
    }

    .announcement-content {
      margin: 0;
      max-height: 0;
      overflow: hidden;
      transition: max-height 320ms ease, padding 320ms ease;
      color: var(--ink);
      font-size: 0.88rem;
      line-height: 1.7;
      white-space: pre-wrap;
      padding: 0 0 0;
      border-top: 0px solid var(--line);
    }

    .announcement-item.open .announcement-content {
      max-height: 400px;
      padding: 10px 0 2px;
      border-top-width: 1px;
      margin-top: 8px;
    }

    /* ── Recommended ── */
    .recommended-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      margin-bottom: 6px;
      transition: border-color 200ms, background 200ms;
    }

    .recommended-item:hover {
      border-color: var(--gold);
      background: var(--gold-light);
    }

    .recommended-cover {
      width: 34px;
      height: 46px;
      border-radius: 3px;
      border: 1px solid var(--line);
      object-fit: cover;
      display: block;
      flex-shrink: 0;
      box-shadow: 2px 2px 6px rgba(0,0,0,0.08);
    }

    .recommended-cover-empty {
      width: 34px;
      height: 46px;
      border-radius: 3px;
      border: 1px dashed var(--line);
      display: grid;
      place-items: center;
      color: var(--subtle);
      font-size: 0.65rem;
      background: #f8f4e9;
      flex-shrink: 0;
    }

    .recommended-info { flex: 1; min-width: 0; }

    .recommended-item h3 {
      margin: 0 0 2px;
      font-size: 0.88rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .recommended-meta {
      margin: 0;
      color: var(--subtle);
      font-size: 0.76rem;
    }

    /* ── Book cards ── */
    .book-card-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .book-pagination {
      margin-top: 14px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .page-btn {
      font: inherit;
      font-size: 0.8rem;
      font-weight: 700;
      min-width: 34px;
      height: 32px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--subtle);
      cursor: pointer;
      transition: border-color 180ms, color 180ms, background 180ms;
    }

    .page-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-light);
    }

    .page-btn.active {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .page-btn:disabled {
      border-color: var(--line);
      color: #a8ada2;
      background: #f5f5f5;
      cursor: not-allowed;
    }

    .book-card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      animation: reveal 380ms ease both;
      transition: transform 220ms, box-shadow 220ms, border-color 220ms;
      cursor: pointer;
    }

    .book-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-lg);
    }

    .book-card.is-active {
      border-color: rgba(42, 98, 71, 0.45);
      box-shadow: var(--shadow-lg);
    }

    .book-card.unavailable {
      filter: grayscale(0.85);
      opacity: 0.72;
    }

    .book-card.unavailable:hover {
      transform: none;
      box-shadow: var(--shadow);
    }

    .book-card-img-wrap {
      width: 100%;
      height: 178px;
      background: linear-gradient(160deg, #f4eedd, #ede5d5);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border-bottom: 1px solid var(--line);
      position: relative;
    }

    .book-card-img-wrap::after {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 6px;
      background: linear-gradient(to right, rgba(0,0,0,0.08), transparent);
    }

    .book-card-img {
      width: 118px;
      height: 158px;
      object-fit: cover;
      display: block;
      border-radius: 3px;
      box-shadow: 3px 3px 12px rgba(0,0,0,0.18);
    }

    .book-card-img-empty {
      width: 118px;
      height: 158px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: var(--subtle);
      font-size: 0.78rem;
      background: #f8f4ec;
      border: 1px dashed var(--line);
      border-radius: 3px;
    }

    .book-card-img-empty::before {
      content: '📖';
      font-size: 1.6rem;
    }

    .book-card-body {
      padding: 13px 13px 14px;
    }

    .book-card-title {
      margin: 0;
      font-size: 0.96rem;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .book-card-rating {
      margin-top: 8px;
      font-size: 0.8rem;
      color: var(--subtle);
    }

    .book-detail-panel {
      margin: 0 0 18px;
    }

    .book-detail-card {
      background: linear-gradient(160deg, #fffefb 0%, #f5f1e7 100%);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      animation: reveal 260ms ease both;
    }

    .book-detail-layout {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 18px;
      padding: 18px;
    }

    .book-detail-cover-wrap {
      min-height: 240px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #f4eedd, #ede5d5);
      border-right: 1px solid var(--line);
      padding: 18px;
    }

    .book-detail-cover {
      width: 140px;
      height: 200px;
      object-fit: cover;
      display: block;
      border-radius: 4px;
      box-shadow: 4px 6px 16px rgba(0,0,0,0.18);
    }

    .book-detail-cover-empty {
      width: 140px;
      height: 200px;
      display: grid;
      place-items: center;
      color: var(--subtle);
      font-size: 0.82rem;
      background: #f8f4ec;
      border: 1px dashed var(--line);
      border-radius: 4px;
    }

    .book-detail-main {
      min-width: 0;
    }

    .book-detail-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .book-detail-title {
      margin: 0 0 8px;
      font-size: 1.35rem;
      line-height: 1.4;
      color: var(--accent-2);
    }

    .book-detail-meta-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px 16px;
      margin-bottom: 16px;
    }

    .book-detail-meta {
      margin: 0;
      color: var(--subtle);
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .book-detail-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }

    .book-detail-price {
      font-weight: 800;
      color: var(--accent-2);
      font-size: 1.02rem;
      letter-spacing: 0.02em;
    }

    .book-detail-action-row {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }

    .book-detail-close {
      font: inherit;
      font-size: 0.78rem;
      font-weight: 700;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--subtle);
      cursor: pointer;
    }

    .book-detail-close:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Chips ── */
    .book-chip {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 2px 9px;
      font-size: 0.76rem;
      font-weight: 700;
      border: 1px solid #cdc6b0;
      background: #f3efe3;
      color: #6a6040;
    }

    .book-chip.recommended {
      border-color: #d4a820;
      background: #fff4cc;
      color: #7a5000;
    }

    .rating-stars {
      color: #e0a800;
      letter-spacing: 1px;
      font-weight: 700;
      white-space: nowrap;
    }

    .borrow-badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 0.74rem;
      font-weight: 700;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .borrow-badge.yes {
      color: #1f6d3a;
      background: #e8f7ec;
      border-color: #b8e2c4;
    }

    .borrow-badge.no {
      color: #8a3b3b;
      background: #fdeeee;
      border-color: #f4c5c5;
    }

    /* ── Borrow button ── */
    .borrow-btn {
      font: inherit;
      font-size: 0.76rem;
      font-weight: 700;
      padding: 4px 13px;
      border-radius: 999px;
      border: 1px solid var(--accent);
      background: var(--accent-light);
      color: var(--accent);
      cursor: pointer;
      transition: background 200ms, color 200ms;
      white-space: nowrap;
    }

    .borrow-btn:hover {
      background: var(--accent);
      color: #fff;
    }

    .book-card:focus-visible {
      outline: 3px solid rgba(42, 98, 71, 0.22);
      outline-offset: 3px;
    }

    .borrow-btn:disabled {
      border-color: var(--line);
      background: #f5f5f5;
      color: var(--subtle);
      cursor: not-allowed;
    }

    .borrow-btn.return-btn {
      border-color: var(--warn);
      background: #fff3eb;
      color: var(--warn);
    }

    .borrow-btn.return-btn:hover {
      background: var(--warn);
      color: #fff;
    }

    /* ── Misc ── */
    .empty {
      margin: 14px 0;
      color: var(--subtle);
      font-style: italic;
      font-size: 0.88rem;
      text-align: center;
    }

    @keyframes reveal {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 900px) {
      .content { grid-template-columns: 1fr; }
      .panel-sticky { position: static; max-height: none; }
      .book-card-grid { grid-template-columns: repeat(2, 1fr); }
      .stats-grid { grid-template-columns: 1fr; }
      .review-form { grid-template-columns: 1fr; }
      .book-detail-layout { grid-template-columns: 1fr; }
      .book-detail-cover-wrap { border-right: none; border-bottom: 1px solid var(--line); }
      .book-detail-meta-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 500px) {
      .book-card-grid { grid-template-columns: 1fr; }
      .site-title { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <div>
        <h1 class="site-title">天下图书</h1>
        <p class="site-title-sub">发现好书 · 了解公告 · 探索世界</p>
      </div>
      <nav class="site-nav">
        <a id="nav-home" class="site-nav-home" href="/index.html" hidden>后台进入</a>
        <a id="nav-login" href="/login.html">用户登录</a>
        <a id="nav-register" href="/register.html">用户注册</a>
        <a href="/profile.html">我的借阅</a>
        <span id="nav-user" class="nav-user" hidden></span>
        <button id="nav-logout" class="nav-logout" type="button" hidden>登出</button>
      </nav>
    </div>
  </header>

  <div class="wrap">
    <div class="content">
      <aside class="panel panel-sticky">
        <h2 class="section-title">系统公告</h2>
        <p class="section-sub">最新消息，点击展开详情。</p>
        <div id="announcement-list"></div>

        <hr class="section-divider" />

        <div class="section-title-row">
          <h2 class="section-title">推荐图书</h2>
          <button class="refresh-btn" id="refresh-recommended" title="随机换一换">换一换</button>
        </div>
        <p class="section-sub">随机推荐 3 本好书。</p>
        <div id="recommended-list"></div>
      </aside>

      <section class="panel">
        <h2 class="section-title">图书列表</h2>
        <p class="section-sub">全部馆藏图书展示。</p>
        <div id="borrow-stats" class="stats-grid" aria-live="polite"></div>
        <div class="search-row">
          <input id="book-search" class="search-input" type="search" placeholder="搜索书名、作者、分类" />
        </div>
        <div id="book-detail-panel" class="book-detail-panel" hidden></div>
        <div id="book-list" class="book-card-grid"></div>
        <div id="book-pagination" class="book-pagination" hidden></div>
      </section>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script>
    const AUTH = window.Demo5Auth;
    const bookListEl = document.getElementById('book-list');
    const recommendedListEl = document.getElementById('recommended-list');
    const announcementListEl = document.getElementById('announcement-list');
    const bookSearchEl = document.getElementById('book-search');
    const bookDetailPanelEl = document.getElementById('book-detail-panel');
    const bookPaginationEl = document.getElementById('book-pagination');
    const borrowStatsEl = document.getElementById('borrow-stats');
    const navHomeEl = document.getElementById('nav-home');
    const navUserEl = document.getElementById('nav-user');
    const navLogoutEl = document.getElementById('nav-logout');

    const BOOKS_PER_PAGE = 6;
    let books = [];
    let reviews = [];
    let bookKeyword = '';
    let currentBookPage = 1;
    let selectedBookId = null;
    let activeBorrowMap = {}; // bookId -> borrowRecordId

    async function syncAuthUi() {
      const user = await AUTH.loadCurrentUser();
      const username = user?.username || '';
      const loggedIn = !!username;
      const isAdmin = AUTH.isAdmin(user);
      document.getElementById('nav-login').hidden = loggedIn;
      document.getElementById('nav-register').hidden = loggedIn;
      navHomeEl.hidden = !isAdmin;
      if (!loggedIn) {
        navUserEl.hidden = true;
        navLogoutEl.hidden = true;
        return;
      }
      navUserEl.hidden = false;
      navLogoutEl.hidden = false;
      navUserEl.textContent = `当前用户：${username}${isAdmin ? '（管理员）' : ''}`;
    }

    function escapeHtml(text) {
      return String(text || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function formatTime(value) {
      if (!value) {
        return '-';
      }
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) {
        return value;
      }
      return date.toLocaleString();
    }

    function formatInt(value) {
      const numeric = Number(value);
      if (!Number.isFinite(numeric)) {
        return '0';
      }
      return String(Math.max(0, Math.round(numeric)));
    }

    function starText(value) {
      const score = Math.min(5, Math.max(1, Math.round(Number(value) || 1)));
      return `<span class="rating-stars" aria-label="${score}星">${'★'.repeat(score)}${'☆'.repeat(5 - score)}</span>`;
    }

    function isBorrowable(stock) {
      return Number(stock) > 0;
    }

    function borrowStatusHtml(stock) {
      if (isBorrowable(stock)) {
        return '<span class="borrow-badge yes">可出借</span>';
      }
      return '<span class="borrow-badge no">不可出借</span>';
    }

    function coverCell(imageUrl, title) {
      if (!imageUrl) {
        return '<div class="cover-empty">无图</div>';
      }
      return `<img class="book-cover" src="${escapeHtml(imageUrl)}" alt="${escapeHtml(title)}" loading="lazy" />`;
    }

    function recommendedCover(imageUrl, title) {
      if (!imageUrl) {
        return '<div class="recommended-cover-empty">无图</div>';
      }
      return `<img class="recommended-cover" src="${escapeHtml(imageUrl)}" alt="${escapeHtml(title)}" loading="lazy" />`;
    }

    function stateLabel(state) {
      return state === 'RECOMMENDED' ? '推荐' : '普通';
    }

    function stateClass(state) {
      return state === 'RECOMMENDED' ? 'recommended' : '';
    }

    function getFilteredBooks() {
      const keyword = bookKeyword.trim().toLowerCase();
      if (!keyword) {
        return books;
      }
      return books.filter((book) => {
        const title = String(book.title || '').toLowerCase();
        const author = String(book.author || '').toLowerCase();
        const category = String(book.category || '').toLowerCase();
        return title.includes(keyword) || author.includes(keyword) || category.includes(keyword);
      });
    }

    function renderRecommendedBooks() {
      const pool = books.filter((book) => book.status === 'RECOMMENDED');
      recommendedListEl.innerHTML = '';
      if (!pool.length) {
        recommendedListEl.innerHTML = '<p class="empty">暂无推荐图书</p>';
        return;
      }

      // shuffle and pick 3
      const shuffled = pool.slice().sort(() => Math.random() - 0.5);
      const display = shuffled.slice(0, 3);

      display.forEach((book) => {
        const box = document.createElement('article');
        box.className = 'recommended-item';
        box.innerHTML = `
          ${recommendedCover(book.image, book.title)}
          <div class="recommended-info">
            <h3>${escapeHtml(book.title)}</h3>
            <p class="recommended-meta">${escapeHtml(book.author)} · 库存 ${formatInt(book.stock)} · 推荐指数 ${starText(book.recommendationIndex)}</p>
            <p class="recommended-meta">${borrowStatusHtml(book.stock)}</p>
          </div>
        `;
        recommendedListEl.appendChild(box);
      });
    }

    function renderBookPagination(totalPages) {
      if (totalPages <= 1) {
        bookPaginationEl.hidden = true;
        bookPaginationEl.innerHTML = '';
        return;
      }

      const pages = Array.from({ length: totalPages }, (_, i) => i + 1)
        .map((page) => `<button class="page-btn${page === currentBookPage ? ' active' : ''}" type="button" data-page="${page}">${page}</button>`)
        .join('');

      bookPaginationEl.hidden = false;
      bookPaginationEl.innerHTML = `
        <button class="page-btn" type="button" data-action="prev" ${currentBookPage === 1 ? 'disabled' : ''}>上一页</button>
        ${pages}
        <button class="page-btn" type="button" data-action="next" ${currentBookPage === totalPages ? 'disabled' : ''}>下一页</button>
      `;
    }

    function renderBooks() {
      const list = getFilteredBooks();
      if (!list.some((book) => String(book.id) === String(selectedBookId))) {
        selectedBookId = null;
      }
      bookListEl.innerHTML = '';
      if (!books.length) {
        bookListEl.innerHTML = '<p class="empty">暂无图书</p>';
        bookPaginationEl.hidden = true;
        bookPaginationEl.innerHTML = '';
        renderBookDetail();
        return;
      }

      if (!list.length) {
        bookListEl.innerHTML = '<p class="empty">未找到匹配的图书</p>';
        bookPaginationEl.hidden = true;
        bookPaginationEl.innerHTML = '';
        renderBookDetail();
        return;
      }

      const totalPages = Math.max(1, Math.ceil(list.length / BOOKS_PER_PAGE));
      if (currentBookPage > totalPages) {
        currentBookPage = totalPages;
      }
      if (currentBookPage < 1) {
        currentBookPage = 1;
      }

      const startIndex = (currentBookPage - 1) * BOOKS_PER_PAGE;
      const visibleBooks = list.slice(startIndex, startIndex + BOOKS_PER_PAGE);
      if (!visibleBooks.some((book) => String(book.id) === String(selectedBookId))) {
        selectedBookId = null;
      }

      visibleBooks.forEach((book) => {
        const card = document.createElement('article');
        const isActive = String(selectedBookId) === String(book.id);
        card.className = `book-card${isBorrowable(book.stock) ? '' : ' unavailable'}${isActive ? ' is-active' : ''}`;
        card.tabIndex = 0;
        card.setAttribute('role', 'button');
        card.setAttribute('aria-expanded', isActive ? 'true' : 'false');
        card.dataset.bookId = String(book.id);
        const innerImg = book.image
          ? `<img class="book-card-img" src="${escapeHtml(book.image)}" alt="${escapeHtml(book.title)}" loading="lazy" />`
          : `<div class="book-card-img-empty">暂无封面</div>`;
        const imgHtml = `<div class="book-card-img-wrap">${innerImg}</div>`;
        card.innerHTML = `
          ${imgHtml}
          <div class="book-card-body">
            <h3 class="book-card-title">${escapeHtml(book.title)}</h3>
            <p class="book-card-rating">推荐指数：${starText(book.recommendationIndex)}</p>
          </div>
        `;
        bookListEl.appendChild(card);
      });

      renderBookPagination(totalPages);
      renderBookDetail();
    }

    function detailCoverHtml(book) {
      if (!book.image) {
        return '<div class="book-detail-cover-empty">暂无封面</div>';
      }
      return `<img class="book-detail-cover" src="${escapeHtml(book.image)}" alt="${escapeHtml(book.title)}" loading="lazy" />`;
    }

    function reviewListHtml(book) {
      const list = getReviewsForBook(book.id);
      if (!list.length) {
        return '<p class="empty">这本书还没有评论，欢迎留下第一条。</p>';
      }
      return `
        <div class="review-list">
          ${list.map((r) => `
            <article class="review-item">
              <div class="review-head">
                <span class="review-book">${escapeHtml(r.username)}</span>
                <span>${reviewStarText(r.rating)} · ${formatTime(r.createdAt)}</span>
              </div>
              <p class="review-comment">${escapeHtml(r.comment || '（未填写文字评价）')}</p>
            </article>
          `).join('')}
        </div>
      `;
    }

    function renderBookDetail() {
      if (selectedBookId == null) {
        bookDetailPanelEl.hidden = true;
        bookDetailPanelEl.innerHTML = '';
        return;
      }
      const book = books.find((item) => String(item.id) === String(selectedBookId));
      if (!book) {
        selectedBookId = null;
        bookDetailPanelEl.hidden = true;
        bookDetailPanelEl.innerHTML = '';
        return;
      }
      bookDetailPanelEl.hidden = false;
      bookDetailPanelEl.innerHTML = `
        <article class="book-detail-card">
          <div class="book-detail-layout">
            <div class="book-detail-cover-wrap">
              ${detailCoverHtml(book)}
            </div>
            <div class="book-detail-main">
              <div class="book-detail-head">
                <div>
                  <h3 class="book-detail-title">${escapeHtml(book.title)}</h3>
                  <p class="book-detail-meta">点击其他图书卡片可切换详情</p>
                </div>
                <button class="book-detail-close" type="button" data-action="close-book-detail">关闭</button>
              </div>
              <div class="book-detail-meta-grid">
                <p class="book-detail-meta">作者：${escapeHtml(book.author)}</p>
                <p class="book-detail-meta">分类：${escapeHtml(book.category)}</p>
                <p class="book-detail-meta">馆藏类型：<span class="book-chip ${stateClass(book.status)}">${stateLabel(book.status)}</span></p>
                <p class="book-detail-meta">推荐指数：${starText(book.recommendationIndex)}</p>
              </div>
              <div class="book-detail-footer">
                <span class="book-detail-price">库存：${formatInt(book.stock)}</span>
                <div class="book-detail-action-row">
                  ${borrowStatusHtml(book.stock)}
                  ${borrowBtnHtml(book)}
                </div>
              </div>
              <div class="book-detail-review-box">
                <div class="section-title-row">
                  <h3 class="section-title">图书评论</h3>
                  <button class="refresh-btn" type="button" data-action="refresh-reviews">刷新评论</button>
                </div>
                <p class="section-sub">这本书的评论会显示在当前详情卡片下方。</p>
                <form class="review-form" data-action="submit-review">
                  <select name="rating" required>
                    <option value="5">5 分</option>
                    <option value="4">4 分</option>
                    <option value="3">3 分</option>
                    <option value="2">2 分</option>
                    <option value="1">1 分</option>
                  </select>
                  <input name="comment" maxlength="400" placeholder="写下你的评价（最多 400 字）" />
                  <button type="submit" data-role="submit-review">发布评价</button>
                </form>
                ${reviewListHtml(book)}
              </div>
            </div>
          </div>
        </article>
      `;
    }

    function toggleBookCard(bookId) {
      const id = String(bookId || '');
      if (!id) {
        return;
      }
      selectedBookId = String(selectedBookId) === id ? null : id;
      renderBooks();
    }

    async function handleBorrowAction(btn) {
      if (!btn || btn.disabled) return;
      const username = AUTH.getStoredUsername();
      if (!username) {
        alert('请先登录');
        window.location.href = '/login.html';
        return;
      }
      const borrowId = btn.dataset.borrowId;
      const bookId = btn.dataset.bookId;
      btn.disabled = true;
      try {
        if (borrowId) {
          const res = await fetch(`/api/borrow/${borrowId}/return`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username })
          });
          const data = await res.json();
          if (!res.ok) { alert(data.message || '归还失败'); return; }
        } else if (bookId) {
          const res = await fetch('/api/borrow', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, bookId: Number(bookId) })
          });
          const data = await res.json();
          if (!res.ok) { alert(data.message || '借阅失败'); return; }
        }
        await loadBooks();
        await loadUserBorrows();
        await loadBorrowStats();
      } catch (err) {
        alert('请求失败，请稍后重试');
      } finally {
        btn.disabled = false;
      }
    }

    async function submitReview(form) {
      const username = AUTH.getStoredUsername();
      if (!username) {
        alert('请先登录后再发布评价');
        window.location.href = '/login.html';
        return;
      }
      const bookId = Number(selectedBookId || 0);
      const rating = Number(form.elements.rating.value || 0);
      const comment = String(form.elements.comment.value || '').trim();
      if (!bookId) {
        alert('请先选择图书');
        return;
      }
      const submitBtn = form.querySelector('[data-role="submit-review"]');
      submitBtn.disabled = true;
      try {
        const res = await fetch('/api/reviews', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, bookId, rating, comment })
        });
        const data = await res.json();
        if (!res.ok) {
          alert(data.message || '发布评价失败');
          return;
        }
        form.reset();
        form.elements.rating.value = '5';
        await loadReviews();
      } catch (error) {
        alert('请求失败，请稍后重试');
      } finally {
        submitBtn.disabled = false;
      }
    }

    function renderBorrowStats(stats) {
      const safe = stats || {};
      const yesterday = Number.isFinite(Number(safe.yesterdayBorrowCount)) ? Number(safe.yesterdayBorrowCount) : 0;
      const today = Number.isFinite(Number(safe.todayBorrowCount)) ? Number(safe.todayBorrowCount) : 0;
      const topName = safe.mostBorrowedBookName ? String(safe.mostBorrowedBookName) : '暂无数据';
      const topCount = Number.isFinite(Number(safe.mostBorrowedBookCount)) ? Number(safe.mostBorrowedBookCount) : 0;

      borrowStatsEl.innerHTML = `
        <article class="stat-card">
          <p class="stat-label">昨日借阅数</p>
          <p class="stat-value">${formatInt(yesterday)}</p>
          <p class="stat-meta">按借出时间统计</p>
        </article>
        <article class="stat-card">
          <p class="stat-label">今日借阅数</p>
          <p class="stat-value">${formatInt(today)}</p>
          <p class="stat-meta">实时刷新</p>
        </article>
        <article class="stat-card">
          <p class="stat-label">借阅最多图书</p>
          <p class="stat-value">${escapeHtml(topName)}</p>
          <p class="stat-meta">累计借阅 ${formatInt(topCount)} 次</p>
        </article>
      `;
    }

    function reviewStarText(value) {
      const score = Math.min(5, Math.max(1, Math.round(Number(value) || 1)));
      return `${'★'.repeat(score)}${'☆'.repeat(5 - score)}`;
    }

    function getReviewsForBook(bookId) {
      return reviews.filter((item) => String(item.bookId) === String(bookId)).slice(0, 8);
    }

    function renderReviews(items) {
      const list = Array.isArray(items) ? items.slice(0, 12) : [];
      reviews = list;
      renderBookDetail();
    }

    async function loadReviews() {
      try {
        const res = await fetch('/api/reviews');
        if (!res.ok) {
          throw new Error('评价加载失败');
        }
        const data = await res.json();
        renderReviews(Array.isArray(data) ? data : []);
      } catch (error) {
        reviews = [];
        renderBookDetail();
      }
    }

    async function loadBorrowStats() {
      try {
        const res = await fetch('/api/borrow/stats');
        if (!res.ok) {
          throw new Error('统计加载失败');
        }
        const data = await res.json();
        renderBorrowStats(data);
      } catch (error) {
        renderBorrowStats({
          yesterdayBorrowCount: 0,
          todayBorrowCount: 0,
          mostBorrowedBookName: '加载失败',
          mostBorrowedBookCount: 0
        });
      }
    }

    function borrowBtnHtml(book) {
      const username = AUTH.getStoredUsername();
      if (!username) return '';
      const borrowId = activeBorrowMap[book.id];
      if (borrowId != null) {
        return `<button class="borrow-btn return-btn" data-borrow-id="${borrowId}" data-book-id="${book.id}">归还</button>`;
      }
      if (!isBorrowable(book.stock)) {
        return `<button class="borrow-btn" disabled>暂无库存</button>`;
      }
      return `<button class="borrow-btn" data-book-id="${book.id}">借阅</button>`;
    }

    async function loadUserBorrows() {
      const username = AUTH.getStoredUsername();
      if (!username) {
        activeBorrowMap = {};
        return;
      }
      try {
        const res = await fetch(`/api/users/${encodeURIComponent(username)}/borrows`);
        if (!res.ok) { activeBorrowMap = {}; return; }
        const data = await res.json();
        activeBorrowMap = {};
        (Array.isArray(data) ? data : []).forEach((r) => {
          if (r.status === 'BORROWED') activeBorrowMap[r.bookId] = r.id;
        });
        renderBooks();
      } catch (e) {
        activeBorrowMap = {};
      }
    }

    async function loadBooks() {
      try {
        const res = await fetch('/api/books');
        if (!res.ok) {
          throw new Error('图书加载失败');
        }
        const data = await res.json();
        books = Array.isArray(data) ? data : [];
        renderBooks();
        renderRecommendedBooks();
      } catch (error) {
        books = [];
        renderBooks();
        renderRecommendedBooks();
      }
    }

    bookListEl.addEventListener('click', async (e) => {
      const btn = e.target.closest('.borrow-btn');
      if (btn) {
        await handleBorrowAction(btn);
        return;
      }
      const card = e.target.closest('.book-card');
      if (!card) {
        return;
      }
      toggleBookCard(card.dataset.bookId);
    });

    bookDetailPanelEl.addEventListener('click', async (e) => {
      const closeBtn = e.target.closest('[data-action="close-book-detail"]');
      if (closeBtn) {
        selectedBookId = null;
        renderBooks();
        return;
      }
      const refreshBtn = e.target.closest('[data-action="refresh-reviews"]');
      if (refreshBtn) {
        await loadReviews();
        return;
      }
      const borrowBtn = e.target.closest('.borrow-btn');
      if (borrowBtn) {
        await handleBorrowAction(borrowBtn);
      }
    });

    bookDetailPanelEl.addEventListener('submit', async (e) => {
      const form = e.target.closest('form[data-action="submit-review"]');
      if (!form) {
        return;
      }
      e.preventDefault();
      await submitReview(form);
    });

    bookListEl.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter' && e.key !== ' ') {
        return;
      }
      const card = e.target.closest('.book-card');
      if (!card) {
        return;
      }
      e.preventDefault();
      toggleBookCard(card.dataset.bookId);
    });

    bookPaginationEl.addEventListener('click', (e) => {
      const target = e.target.closest('button');
      if (!target || target.disabled) {
        return;
      }
      const list = getFilteredBooks();
      const totalPages = Math.max(1, Math.ceil(list.length / BOOKS_PER_PAGE));
      if (target.dataset.action === 'prev') {
        currentBookPage = Math.max(1, currentBookPage - 1);
      } else if (target.dataset.action === 'next') {
        currentBookPage = Math.min(totalPages, currentBookPage + 1);
      } else if (target.dataset.page) {
        const nextPage = Number(target.dataset.page);
        if (Number.isFinite(nextPage) && nextPage >= 1 && nextPage <= totalPages) {
          currentBookPage = nextPage;
        }
      }
      renderBooks();
    });

    function renderAnnouncements(items) {
      announcementListEl.innerHTML = '';
      if (!items.length) {
        announcementListEl.innerHTML = '<p class="empty">暂无公告</p>';
        return;
      }

      items.forEach((item) => {
        const box = document.createElement('article');
        box.className = 'announcement-item';
        box.innerHTML = `
          <h3>
            <span class="announcement-title-text">${escapeHtml(item.title)}</span>
            <span class="announcement-toggle">展开</span>
          </h3>
          <p class="announcement-meta">${formatTime(item.publishedAt)}</p>
          <p class="announcement-content">${escapeHtml(item.content)}</p>
        `;
        box.addEventListener('click', () => {
          const isOpen = box.classList.toggle('open');
          box.querySelector('.announcement-toggle').textContent = isOpen ? '收起' : '展开';
        });
        announcementListEl.appendChild(box);
      });
    }

    async function loadAnnouncements() {
      try {
        const res = await fetch('/api/announcements');
        const data = await res.json();
        renderAnnouncements(Array.isArray(data) ? data : []);
      } catch (error) {
        announcementListEl.innerHTML = '<p class="empty">公告加载失败，请稍后刷新重试。</p>';
      }
    }

    loadBooks().then(() => loadUserBorrows());
    loadAnnouncements();
    loadBorrowStats();
    loadReviews();

    bookSearchEl.addEventListener('input', () => {
      bookKeyword = bookSearchEl.value || '';
      currentBookPage = 1;
      renderBooks();
    });

    document.getElementById('refresh-recommended').addEventListener('click', () => {
      renderRecommendedBooks();
    });

    navLogoutEl.addEventListener('click', () => {
      AUTH.clearUser();
      syncAuthUi();
      window.location.href = '/login.html';
    });

    syncAuthUi();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>用户登录</title>
  <style>
    :root {
      --bg-1: #f6f2e7;
      --bg-2: #e8f1e5;
      --paper: #fffdf8;
      --ink: #2a2f24;
      --subtle: #6d7461;
      --line: #d8d2c0;
      --accent: #2f6d4f;
      --accent-2: #1f5039;
      --danger: #bb3f3f;
      --ok: #2d7b4a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: var(--ink);
      font-family: "Noto Serif SC", "Microsoft YaHei", serif;
      background:
        radial-gradient(circle at 12% 8%, #f1e2c8 0 20%, transparent 21%),
        radial-gradient(circle at 88% 14%, #cfe4d5 0 24%, transparent 25%),
        linear-gradient(140deg, var(--bg-1), var(--bg-2));
    }

    .card {
      width: min(460px, 92vw);
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 12px 30px rgba(42, 47, 36, 0.08);
    }

    h1 {
      margin: 0 0 10px;
      letter-spacing: 0.02em;
    }

    .subtitle {
      margin: 0 0 16px;
      color: var(--subtle);
    }

    .links {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .links a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 700;
    }

    input,
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 12px;
      font: inherit;
      color: var(--ink);
      background: #fff;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 18px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      font: inherit;
    }

    button:hover {
      background: var(--accent-2);
    }

    .status {
      margin: 12px 0 0;
      color: var(--subtle);
      font-weight: 700;
      min-height: 1.5em;
    }

    .status.error { color: var(--danger); }
    .status.ok { color: var(--ok); }
  </style>
</head>
<body>
  <main class="card">
    <h1>用户登录</h1>
    <p class="subtitle">请选择登录身份：用户进入首页，管理员进入后台。</p>

    <div class="links">
      <a href="/tianxia.html">返回首页</a>
      <a href="/register.html">去注册</a>
    </div>

    <form id="login-form">
      <label for="login-role">登录身份</label>
      <select id="login-role" required>
        <option value="USER" selected>用户登录</option>
        <option value="ADMIN">管理员登录</option>
      </select>

      <label for="username">用户名</label>
      <input id="username" maxlength="20" placeholder="请输入用户名" required />

      <label for="password">密码</label>
      <input id="password" type="password" minlength="6" maxlength="50" placeholder="请输入密码" required />

      <button id="submit-btn" type="submit">登录</button>
      <p id="status" class="status"></p>
    </form>
  </main>

  <script src="/js/auth.js"></script>
  <script>
    const AUTH = window.Demo5Auth;
    const form = document.getElementById('login-form');
    const loginRoleInput = document.getElementById('login-role');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const statusEl = document.getElementById('status');
    const submitBtn = document.getElementById('submit-btn');

    const existingUser = AUTH.getStoredUser();
    if (existingUser?.username) {
      window.location.href = AUTH.isAdmin(existingUser) ? '/index.html' : '/tianxia.html';
    }

    function setStatus(message, mode) {
      statusEl.textContent = message || '';
      statusEl.className = mode ? `status ${mode}` : 'status';
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      const username = usernameInput.value.trim();
      const password = passwordInput.value;
      const loginRole = loginRoleInput.value === 'ADMIN' ? 'ADMIN' : 'USER';
      if (!username || !password) {
        setStatus('请输入用户名和密码', 'error');
        return;
      }

      submitBtn.disabled = true;
      setStatus('正在登录...', '');

      try {
        const res = await fetch('/api/users/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password, loginRole })
        });

        const body = await res.json().catch(() => ({}));
        if (!res.ok) {
          throw new Error(body.message || '登录失败');
        }

        const user = body.user || { username, role: 'USER' };
        AUTH.saveUser(user);
        setStatus(body.message || '登录成功，正在跳转...', 'ok');
        setTimeout(() => {
          window.location.href = loginRole === 'ADMIN' ? '/index.html' : '/tianxia.html';
        }, 400);
      } catch (error) {
        setStatus(error.message || '登录失败', 'error');
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>

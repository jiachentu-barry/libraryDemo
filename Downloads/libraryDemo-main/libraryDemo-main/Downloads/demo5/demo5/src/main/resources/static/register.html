<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>用户注册</title>
  <style>
    :root {
      --bg-1: #f6f2e7;
      --bg-2: #e8f1e5;
      --paper: #fffdf8;
      --ink: #2a2f24;
      --subtle: #6d7461;
      --line: #d8d2c0;
      --accent: #2f6d4f;
      --accent-2: #1f5039;
      --danger: #bb3f3f;
      --ok: #2d7b4a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: var(--ink);
      font-family: "Noto Serif SC", "Microsoft YaHei", serif;
      background:
        radial-gradient(circle at 12% 8%, #f1e2c8 0 20%, transparent 21%),
        radial-gradient(circle at 88% 14%, #cfe4d5 0 24%, transparent 25%),
        linear-gradient(140deg, var(--bg-1), var(--bg-2));
    }

    .card {
      width: min(460px, 92vw);
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 12px 30px rgba(42, 47, 36, 0.08);
    }

    h1 {
      margin: 0 0 10px;
      letter-spacing: 0.02em;
    }

    .subtitle {
      margin: 0 0 16px;
      color: var(--subtle);
    }

    .links {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .links a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 700;
    }

    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 12px;
      font: inherit;
      color: var(--ink);
      background: #fff;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 18px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      font: inherit;
    }

    button:hover {
      background: var(--accent-2);
    }

    .status {
      margin: 12px 0 0;
      color: var(--subtle);
      font-weight: 700;
      min-height: 1.5em;
    }

    .status.error { color: var(--danger); }
    .status.ok { color: var(--ok); }
  </style>
</head>
<body>
  <main class="card">
    <h1>用户注册</h1>
    <p class="subtitle">创建一个新账号，用于图书系统。</p>

    <div class="links">
      <a href="/">返回首页</a>
      <a href="/login.html">去登录</a>
      <a href="/tianxia.html">天下图书</a>
    </div>

    <form id="register-form">
      <label for="username">用户名</label>
      <input id="username" maxlength="20" placeholder="3-20 位字母、数字或下划线" required />

      <label for="password">密码</label>
      <input id="password" type="password" minlength="6" maxlength="50" placeholder="至少 6 位" required />

      <label for="confirm-password">确认密码</label>
      <input id="confirm-password" type="password" minlength="6" maxlength="50" placeholder="再次输入密码" required />

      <button id="submit-btn" type="submit">注册</button>
      <p id="status" class="status"></p>
    </form>
  </main>

  <script>
    const form = document.getElementById('register-form');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const confirmPasswordInput = document.getElementById('confirm-password');
    const statusEl = document.getElementById('status');
    const submitBtn = document.getElementById('submit-btn');

    function setStatus(message, mode) {
      statusEl.textContent = message || '';
      statusEl.className = mode ? `status ${mode}` : 'status';
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      const username = usernameInput.value.trim();
      const password = passwordInput.value;
      const confirmPassword = confirmPasswordInput.value;

      if (!/^[a-zA-Z0-9_]{3,20}$/.test(username)) {
        setStatus('用户名需为 3-20 位字母、数字或下划线', 'error');
        return;
      }
      if (password.length < 6 || password.length > 50) {
        setStatus('密码长度需为 6-50 位', 'error');
        return;
      }
      if (password !== confirmPassword) {
        setStatus('两次输入的密码不一致', 'error');
        return;
      }

      submitBtn.disabled = true;
      setStatus('正在注册...', '');

      try {
        const res = await fetch('/api/users/register', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });

        const body = await res.json().catch(() => ({}));
        if (!res.ok) {
          throw new Error(body.message || '注册失败');
        }

        setStatus(body.message || '注册成功', 'ok');
        form.reset();
      } catch (error) {
        setStatus(error.message || '注册失败', 'error');
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>

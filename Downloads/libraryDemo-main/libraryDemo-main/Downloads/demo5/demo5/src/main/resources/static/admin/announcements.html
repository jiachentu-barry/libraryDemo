<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>后台管理 - 公告发布</title>
  <style>
    :root {
      --bg-1: #f6f2e7;
      --bg-2: #e8f1e5;
      --paper: #fffdf8;
      --ink: #2a2f24;
      --subtle: #6d7461;
      --line: #d8d2c0;
      --accent: #2f6d4f;
      --accent-2: #1f5039;
      --danger: #bb3f3f;
      --ok: #2f6d4f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      font-family: "Noto Serif SC", "Microsoft YaHei", serif;
      background:
        radial-gradient(circle at 12% 8%, #f1e2c8 0 20%, transparent 21%),
        radial-gradient(circle at 88% 14%, #cfe4d5 0 24%, transparent 25%),
        linear-gradient(140deg, var(--bg-1), var(--bg-2));
      min-height: 100vh;
    }

    .container {
      width: min(1000px, 94vw);
      margin: 30px auto;
    }

    .card {
      background: color-mix(in srgb, var(--paper) 90%, white 10%);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 12px 30px rgba(42, 47, 36, 0.08);
    }

    h1 {
      margin: 0 0 10px;
      letter-spacing: 0.02em;
      font-size: 1.6rem;
    }

    h2 {
      margin: 16px 0 12px;
      font-size: 1.2rem;
      letter-spacing: 0.02em;
    }

    .subtitle {
      margin: 0 0 14px;
      color: var(--subtle);
      font-size: 0.95rem;
    }

    .admin-nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .admin-nav a {
      color: #415041;
      text-decoration: none;
      font-weight: 700;
      padding: 8px 14px;
      border: 1px solid #d3ddce;
      border-radius: 999px;
      background: #f3f8f0;
      transition: border-color 180ms, color 180ms, background 180ms;
      font-size: 0.9rem;
    }

    .admin-nav a:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: #ecf5ef;
    }

    .admin-nav a.active {
      border-color: var(--accent);
      color: #fff;
      background: var(--accent);
    }

    .top-links {
      display: flex;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .top-links a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
      font-size: 0.9rem;
    }

    .top-links a:hover {
      text-decoration: underline;
    }

    label {
      display: block;
      font-weight: 700;
      margin: 10px 0 6px;
      color: var(--ink);
      font-size: 0.95rem;
    }

    input,
    select,
    textarea,
    button {
      font: inherit;
      font-family: "Microsoft YaHei", sans-serif;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      background: #fff;
      color: var(--ink);
      transition: border-color 180ms;
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(47, 109, 79, 0.1);
    }

    textarea {
      min-height: 140px;
      resize: vertical;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .form-row > div {
      min-width: 0;
    }

    .actions {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 18px;
      cursor: pointer;
      font-weight: 700;
      color: #fff;
      background: var(--accent);
      transition: background 180ms;
      font-size: 0.9rem;
    }

    button:hover {
      background: var(--accent-2);
    }

    button:active {
      transform: scale(0.98);
    }

    button.secondary {
      background: #7d8674;
    }

    button.secondary:hover {
      background: #656d5c;
    }

    button.danger {
      background: var(--danger);
    }

    button.danger:hover {
      background: #a03333;
    }

    .status {
      margin: 0;
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--subtle);
    }

    .status.ok {
      color: var(--ok);
    }

    .status.error {
      color: var(--danger);
    }

    .announcement-item {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
      background: linear-gradient(180deg, #fff 0%, #faf7f0 100%);
      transition: box-shadow 180ms, transform 180ms;
    }

    .announcement-item:hover {
      box-shadow: 0 4px 12px rgba(47, 109, 79, 0.1);
      transform: translateY(-1px);
    }

    .announcement-item h3 {
      margin: 0 0 8px;
      font-size: 1.05rem;
      color: var(--ink);
    }

    .announcement-meta {
      margin: 0 0 10px;
      color: var(--subtle);
      font-size: 0.85rem;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .announcement-content {
      margin: 10px 0;
      color: var(--ink);
      font-size: 0.95rem;
      line-height: 1.5;
      word-break: break-word;
    }

    .announcement-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .status-badge {
      display: inline-flex;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.80rem;
      font-weight: 700;
      border: 1px solid;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .status-badge.published {
      color: #1f6d3a;
      background: #e8f7ec;
      border-color: #b8e2c4;
    }

    .status-badge.draft {
      color: #8c6211;
      background: #fff5df;
      border-color: #f2dfb5;
    }

    .item-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .item-actions button {
      padding: 6px 12px;
      font-size: 0.8rem;
      border-radius: 8px;
      flex-shrink: 0;
    }

    .item-actions .edit-btn {
      background: #7d8674;
    }

    .item-actions .edit-btn:hover {
      background: #656d5c;
    }

    .item-actions .delete-btn {
      background: var(--danger);
    }

    .item-actions .delete-btn:hover {
      background: #a03333;
    }

    .empty {
      color: var(--subtle);
      margin: 0;
      padding: 20px;
      text-align: center;
      font-size: 0.95rem;
    }

    @media (max-width: 768px) {
      .form-row {
        grid-template-columns: 1fr;
      }

      .container {
        width: min(600px, 96vw);
        margin: 20px auto;
      }

      .card {
        padding: 14px;
        margin-bottom: 12px;
      }

      h1 {
        font-size: 1.4rem;
      }

      h2 {
        font-size: 1.1rem;
        margin: 12px 0 10px;
      }

      .announcement-toolbar {
        flex-direction: column;
        align-items: flex-start;
      }

      .announcement-item h3 {
        font-size: 1rem;
      }

      .item-actions {
        width: 100%;
      }

      .item-actions button {
        flex: 1;
        min-width: 60px;
      }
    }

    @media (max-width: 480px) {
      .admin-nav a {
        padding: 6px 10px;
        font-size: 0.8rem;
      }

      button {
        padding: 8px 14px;
        font-size: 0.85rem;
      }

      label {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="card">
      <h1>公告发布</h1>
      <p class="subtitle">创建、编辑或发布系统公告</p>
      <nav class="admin-nav" aria-label="后台管理导航">
        <a href="/index.html">后台首页</a>
        <a href="/admin/books.html">图书编辑</a>
        <a href="/admin/book-upload.html">图书上传</a>
        <a href="/admin/borrows.html">借阅总览</a>
        <a class="active" href="/admin/announcements.html">公告管理</a>
        <a href="/admin/reviews.html">评论总览</a>
        <a href="/admin/users.html">管理员管理</a>
      </nav>

      <form id="publish-form">
        <div class="form-row">
          <div>
            <label for="title">公告标题</label>
            <input id="title" name="title" maxlength="120" placeholder="输入公告标题" required />
          </div>
          <div>
            <label for="statusSelect">公告状态</label>
            <select id="statusSelect" name="status">
              <option value="PUBLISHED">已发布</option>
              <option value="DRAFT">草稿</option>
            </select>
          </div>
        </div>

        <label for="content">公告内容</label>
        <textarea id="content" name="content" maxlength="4000" placeholder="输入公告内容（最多4000字）" required></textarea>

        <div class="actions">
          <button id="submitBtn" type="submit">发布公告</button>
          <button id="cancelEditBtn" class="secondary" type="button" hidden>取消编辑</button>
          <p id="status" class="status"></p>
        </div>
      </form>
    </section>

    <section class="card">
      <h2>已发布公告</h2>
      <div id="announcement-list"></div>
    </section>
  </div>

  <script src="/js/auth.js"></script>
  <script>
    const AUTH = window.Demo5Auth;
    const adminHeaders = () => AUTH.buildAuthHeaders(AUTH.getStoredUser());
    AUTH.requireAdminPage();

    const form = document.getElementById('publish-form');
    const titleInput = document.getElementById('title');
    const contentInput = document.getElementById('content');
    const statusInput = document.getElementById('statusSelect');
    const statusEl = document.getElementById('status');
    const submitBtn = document.getElementById('submitBtn');
    const cancelEditBtn = document.getElementById('cancelEditBtn');
    const listEl = document.getElementById('announcement-list');
    let editingId = null;
    let allItems = [];

    function escapeHtml(text) {
      return String(text || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function statusLabel(status) {
      return status === 'DRAFT' ? '草稿' : '已发布';
    }

    function statusClass(status) {
      return status === 'DRAFT' ? 'draft' : 'published';
    }

    function formatTime(value) {
      if (!value) {
        return '-';
      }
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) {
        return value;
      }
      return date.toLocaleString();
    }

    function renderList(items) {
      listEl.innerHTML = '';
      if (!items.length) {
        listEl.innerHTML = '<p class="empty">暂无公告</p>';
        return;
      }

      items.forEach((item) => {
        const box = document.createElement('article');
        box.className = 'announcement-item';
        box.innerHTML = `
          <div class="announcement-toolbar">
            <h3>${escapeHtml(item.title)}</h3>
            <span class="status-badge ${statusClass(item.status)}">${statusLabel(item.status)}</span>
          </div>
          <div class="announcement-meta">
            <span>发布时间：${formatTime(item.publishedAt)}</span>
          </div>
          <div class="announcement-content">${escapeHtml(item.content)}</div>
          <div class="item-actions">
            <button class="edit-btn" type="button" data-id="${item.id}">编辑</button>
            <button class="delete-btn" type="button" data-id="${item.id}">删除</button>
          </div>
        `;
        listEl.appendChild(box);
      });
    }

    async function loadAnnouncements() {
      try {
        const res = await fetch('/api/admin/announcements', {
          headers: adminHeaders()
        });
        const data = await res.json();
        allItems = Array.isArray(data) ? data : [];
        renderList(allItems);
      } catch (error) {
        listEl.innerHTML = '<p class="empty">加载失败，请稍后刷新重试。</p>';
      }
    }

    function resetFormMode() {
      editingId = null;
      submitBtn.textContent = '发布公告';
      cancelEditBtn.hidden = true;
      form.reset();
      statusInput.value = 'PUBLISHED';
    }

    function startEdit(item) {
      editingId = item.id;
      titleInput.value = item.title || '';
      contentInput.value = item.content || '';
      statusInput.value = item.status || 'PUBLISHED';
      submitBtn.textContent = '保存修改';
      cancelEditBtn.hidden = false;
      statusEl.textContent = `正在编辑：${item.title || ''}`;
      statusEl.className = 'status';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      statusEl.textContent = '';
      statusEl.className = 'status';

      const payload = {
        title: titleInput.value,
        content: contentInput.value,
        status: statusInput.value
      };

      try {
        const url = editingId ? `/api/admin/announcements/${editingId}` : '/api/admin/announcements';
        const method = editingId ? 'PUT' : 'POST';
        const res = await fetch(url, {
          method,
          headers: {
            'Content-Type': 'application/json',
            ...adminHeaders()
          },
          body: JSON.stringify(payload)
        });

        if (!res.ok) {
          const errorBody = await res.json().catch(() => ({}));
          throw new Error(errorBody.message || (editingId ? '更新失败' : '发布失败'));
        }

        statusEl.textContent = editingId ? '修改成功' : '发布成功';
        statusEl.classList.add('ok');
        resetFormMode();
        await loadAnnouncements();
      } catch (error) {
        statusEl.textContent = error.message || (editingId ? '更新失败' : '发布失败');
        statusEl.classList.add('error');
      }
    });

    cancelEditBtn.addEventListener('click', () => {
      statusEl.textContent = '已取消编辑';
      statusEl.className = 'status';
      resetFormMode();
    });

    listEl.addEventListener('click', (event) => {
      const target = event.target;
      if (!(target instanceof HTMLElement)) {
        return;
      }

      const editBtn = target.closest('.edit-btn');
      if (editBtn) {
        const itemId = Number(editBtn.dataset.id);
        if (!itemId) {
          return;
        }
        const item = allItems.find((entry) => entry.id === itemId);
        if (!item) {
          return;
        }
        startEdit(item);
        return;
      }

      const deleteBtn = target.closest('.delete-btn');
      if (deleteBtn) {
        const itemId = Number(deleteBtn.dataset.id);
        if (!itemId) {
          return;
        }
        const item = allItems.find((entry) => entry.id === itemId);
        if (!item) {
          return;
        }
        if (confirm(`确定要删除公告"${item.title}"吗？`)) {
          deleteAnnouncement(itemId);
        }
      }
    });

    async function deleteAnnouncement(id) {
      try {
        const res = await fetch(`/api/admin/announcements/${id}`, {
          method: 'DELETE',
          headers: adminHeaders()
        });

        if (!res.ok) {
          const errorBody = await res.json().catch(() => ({}));
          throw new Error(errorBody.message || '删除失败');
        }

        statusEl.textContent = '删除成功';
        statusEl.className = 'status ok';
        await loadAnnouncements();
      } catch (error) {
        statusEl.textContent = error.message || '删除失败';
        statusEl.className = 'status error';
      }
    }

    statusInput.value = 'PUBLISHED';
    loadAnnouncements();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>后台管理 - 公告发布</title>
  <style>
    :root {
      --bg: #f6f8fc;
      --card: #ffffff;
      --text: #1f2a44;
      --muted: #6f7b94;
      --line: #dbe2f0;
      --primary: #1a73e8;
      --primary-dark: #155dc0;
      --danger: #c53b3b;
      --ok: #1f8a4c;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Microsoft YaHei", sans-serif;
      background: linear-gradient(140deg, #eff4ff, var(--bg));
      color: var(--text);
    }

    .container {
      width: min(960px, 92vw);
      margin: 36px auto;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 1.5rem;
    }

    .admin-nav {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .admin-nav a {
      color: #2f4b7a;
      text-decoration: none;
      font-weight: 700;
      padding: 7px 14px;
      border: 1px solid #cdd9ef;
      border-radius: 999px;
      background: #f1f6ff;
      transition: border-color 180ms, color 180ms, background 180ms;
    }

    .admin-nav a:hover {
      color: var(--primary);
      border-color: var(--primary);
      background: #e9f1ff;
    }

    .admin-nav a.active {
      color: #fff;
      border-color: var(--primary);
      background: var(--primary);
    }

    .top-links {
      display: flex;
      gap: 12px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .top-links a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 700;
    }

    label {
      display: block;
      font-weight: 700;
      margin: 10px 0 6px;
    }

    input,
    select,
    textarea,
    button {
      font: inherit;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: #fff;
      color: var(--text);
    }

    textarea {
      min-height: 140px;
      resize: vertical;
    }

    .actions {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 18px;
      cursor: pointer;
      font-weight: 700;
      color: #fff;
      background: var(--primary);
    }

    button:hover {
      background: var(--primary-dark);
    }

    button.secondary {
      background: #60718f;
    }

    button.secondary:hover {
      background: #4d5b73;
    }

    .status {
      margin: 0;
      font-weight: 700;
    }

    .status.ok {
      color: var(--ok);
    }

    .status.error {
      color: var(--danger);
    }

    .announcement-item {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
      background: #fff;
    }

    .announcement-item h3 {
      margin: 0 0 6px;
    }

    .announcement-meta {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .announcement-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .status-badge {
      display: inline-flex;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 700;
      border: 1px solid var(--line);
    }

    .status-badge.published {
      color: #1f8a4c;
      background: #ecf9f0;
      border-color: #cdebd8;
    }

    .status-badge.draft {
      color: #8c6211;
      background: #fff5df;
      border-color: #f2dfb5;
    }

    .item-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .empty {
      color: var(--muted);
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="card">
      <h1>后台管理 - 公告发布</h1>
      <nav class="admin-nav" aria-label="后台管理导航">
          <a href="/">后台首页</a>
        <a href="/admin/books.html">图书编辑</a>
        <a href="/admin/book-upload.html">图书上传</a>
        <a href="/admin/borrows.html">借阅总览</a>
        <a class="active" href="/admin/announcements.html">公告管理</a>
        <a href="/admin/reviews.html">评论总览</a>
      </nav>
      <div class="top-links">
        <a href="/">返回首页</a>
        <a href="/announcements.html">查看前台公告页</a>
      </div>
      <form id="publish-form">
        <label for="title">公告标题</label>
        <input id="title" name="title" maxlength="120" required />

        <label for="content">公告内容</label>
        <textarea id="content" name="content" maxlength="4000" required></textarea>

        <label for="statusSelect">公告状态</label>
        <select id="statusSelect" name="status">
          <option value="PUBLISHED">已发布</option>
          <option value="DRAFT">草稿</option>
        </select>

        <div class="actions">
          <button id="submitBtn" type="submit">发布公告</button>
          <button id="cancelEditBtn" class="secondary" type="button" hidden>取消编辑</button>
          <p id="status" class="status"></p>
        </div>
      </form>
    </section>

    <section class="card">
      <h2>已发布公告</h2>
      <div id="announcement-list"></div>
    </section>
  </div>

  <script>
    const form = document.getElementById('publish-form');
    const titleInput = document.getElementById('title');
    const contentInput = document.getElementById('content');
    const statusInput = document.getElementById('statusSelect');
    const statusEl = document.getElementById('status');
    const submitBtn = document.getElementById('submitBtn');
    const cancelEditBtn = document.getElementById('cancelEditBtn');
    const listEl = document.getElementById('announcement-list');
    let editingId = null;
    let allItems = [];

    function escapeHtml(text) {
      return String(text || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function statusLabel(status) {
      return status === 'DRAFT' ? '草稿' : '已发布';
    }

    function statusClass(status) {
      return status === 'DRAFT' ? 'draft' : 'published';
    }

    function formatTime(value) {
      if (!value) {
        return '-';
      }
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) {
        return value;
      }
      return date.toLocaleString();
    }

    function renderList(items) {
      listEl.innerHTML = '';
      if (!items.length) {
        listEl.innerHTML = '<p class="empty">暂无公告</p>';
        return;
      }

      items.forEach((item) => {
        const box = document.createElement('article');
        box.className = 'announcement-item';
        box.innerHTML = `
          <div class="announcement-toolbar">
            <h3>${escapeHtml(item.title)}</h3>
            <span class="status-badge ${statusClass(item.status)}">${statusLabel(item.status)}</span>
          </div>
          <p class="announcement-meta">发布时间：${formatTime(item.publishedAt)}</p>
          <p>${escapeHtml(item.content)}</p>
          <div class="item-actions">
            <button class="secondary edit-btn" type="button" data-id="${item.id}">编辑</button>
          </div>
        `;
        listEl.appendChild(box);
      });
    }

    async function loadAnnouncements() {
      try {
        const res = await fetch('/api/admin/announcements');
        const data = await res.json();
        allItems = Array.isArray(data) ? data : [];
        renderList(allItems);
      } catch (error) {
        listEl.innerHTML = '<p class="empty">加载失败，请稍后刷新重试。</p>';
      }
    }

    function resetFormMode() {
      editingId = null;
      submitBtn.textContent = '发布公告';
      cancelEditBtn.hidden = true;
      form.reset();
      statusInput.value = 'PUBLISHED';
    }

    function startEdit(item) {
      editingId = item.id;
      titleInput.value = item.title || '';
      contentInput.value = item.content || '';
      statusInput.value = item.status || 'PUBLISHED';
      submitBtn.textContent = '保存修改';
      cancelEditBtn.hidden = false;
      statusEl.textContent = `正在编辑：${item.title || ''}`;
      statusEl.className = 'status';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      statusEl.textContent = '';
      statusEl.className = 'status';

      const payload = {
        title: titleInput.value,
        content: contentInput.value,
        status: statusInput.value
      };

      try {
        const url = editingId ? `/api/admin/announcements/${editingId}` : '/api/admin/announcements';
        const method = editingId ? 'PUT' : 'POST';
        const res = await fetch(url, {
          method,
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });

        if (!res.ok) {
          const errorBody = await res.json().catch(() => ({}));
          throw new Error(errorBody.message || (editingId ? '更新失败' : '发布失败'));
        }

        statusEl.textContent = editingId ? '修改成功' : '发布成功';
        statusEl.classList.add('ok');
        resetFormMode();
        await loadAnnouncements();
      } catch (error) {
        statusEl.textContent = error.message || (editingId ? '更新失败' : '发布失败');
        statusEl.classList.add('error');
      }
    });

    cancelEditBtn.addEventListener('click', () => {
      statusEl.textContent = '已取消编辑';
      statusEl.className = 'status';
      resetFormMode();
    });

    listEl.addEventListener('click', (event) => {
      const target = event.target;
      if (!(target instanceof HTMLElement)) {
        return;
      }
      const editBtn = target.closest('.edit-btn');
      if (!editBtn) {
        return;
      }
      const itemId = Number(editBtn.dataset.id);
      if (!itemId) {
        return;
      }
      const item = allItems.find((entry) => entry.id === itemId);
      if (!item) {
        return;
      }
      startEdit(item);
    });

    statusInput.value = 'PUBLISHED';
    loadAnnouncements();
  </script>
</body>
</html>

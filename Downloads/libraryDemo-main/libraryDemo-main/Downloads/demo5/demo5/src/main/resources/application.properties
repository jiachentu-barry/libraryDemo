spring.application.name=demo5

# MySQL datasource
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:demo2}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Tokyo
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Daily CSV export for yesterday's borrow records
borrow.export.cron=0 35 15 * * *
borrow.export.zone=Asia/Tokyo
borrow.export.output-dir=exports/borrows



<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>后台管理 - 借阅总览</title>
  <style>
    :root {
      --bg-1: #f6f2e7;
      --bg-2: #e8f1e5;
      --paper: #fffdf8;
      --ink: #2a2f24;
      --subtle: #6d7461;
      --line: #d8d2c0;
      --accent: #2f6d4f;
      --accent-2: #1f5039;
      --danger: #bb3f3f;
      --ok: #2f6d4f;
      --warn: #9d5b2c;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      font-family: "Noto Serif SC", "Microsoft YaHei", serif;
      background:
        radial-gradient(circle at 12% 8%, #f1e2c8 0 20%, transparent 21%),
        radial-gradient(circle at 88% 14%, #cfe4d5 0 24%, transparent 25%),
        linear-gradient(140deg, var(--bg-1), var(--bg-2));
      min-height: 100vh;
    }

    .container {
      width: min(1200px, 94vw);
      margin: 30px auto;
    }

    .card {
      background: color-mix(in srgb, var(--paper) 90%, white 10%);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 12px 30px rgba(42, 47, 36, 0.08);
    }

    h1 {
      margin: 0 0 10px;
      letter-spacing: 0.02em;
      font-size: 1.6rem;
    }

    h2 {
      margin: 0 0 10px;
      font-size: 1.1rem;
      letter-spacing: 0.02em;
      color: var(--ink);
    }

    .subtitle {
      margin: 0 0 14px;
      color: var(--subtle);
      font-size: 0.95rem;
    }

    .admin-nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .admin-nav a {
      color: #415041;
      text-decoration: none;
      font-weight: 700;
      padding: 8px 14px;
      border: 1px solid #d3ddce;
      border-radius: 999px;
      background: #f3f8f0;
      transition: border-color 180ms, color 180ms, background 180ms;
      font-size: 0.9rem;
    }

    .admin-nav a:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: #ecf5ef;
    }

    .admin-nav a.active {
      border-color: var(--accent);
      color: #fff;
      background: var(--accent);
    }

    .top-links {
      display: flex;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .top-links a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
      font-size: 0.9rem;
    }

    .top-links a:hover {
      text-decoration: underline;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }

    .stat-box {
      background: linear-gradient(135deg, #f4fbf6 0%, #e4f0e8 100%);
      border: 1px solid #b8e2c4;
      border-radius: 12px;
      padding: 12px 16px;
      text-align: center;
    }

    .stat-label {
      font-size: 0.8rem;
      color: var(--subtle);
      margin: 0 0 6px;
      font-weight: 700;
    }

    .stat-value {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--accent);
      margin: 0;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 14px;
      padding: 12px;
      background: linear-gradient(180deg, #faf8f3 0%, #f5f0e8 100%);
      border-radius: 12px;
      border: 1px solid #e8dfd0;
    }

    .toolbar input,
    .toolbar select,
    .toolbar button {
      font: inherit;
      font-family: "Microsoft YaHei", sans-serif;
      border-radius: 8px;
    }

    .toolbar input,
    .toolbar select {
      border: 1px solid var(--line);
      padding: 9px 12px;
      background: #fff;
      color: var(--ink);
      flex: 1;
      min-width: 160px;
      transition: border-color 180ms;
    }

    .toolbar input:focus,
    .toolbar select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(47, 109, 79, 0.1);
    }

    .toolbar button {
      border: 0;
      padding: 9px 16px;
      cursor: pointer;
      font-weight: 700;
      color: #fff;
      background: var(--accent);
      transition: background 180ms;
      white-space: nowrap;
    }

    .toolbar button:hover {
      background: var(--accent-2);
    }

    .status {
      margin: 0;
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--subtle);
    }

    .status.ok {
      color: var(--ok);
    }

    .status.error {
      color: var(--danger);
    }

    .table-wrap {
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
    }

    .responsive-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      padding: 12px 10px;
      text-align: left;
      vertical-align: middle;
      font-size: 0.92rem;
    }

    th {
      background: linear-gradient(180deg, #f4efdf 0%, #ede5d2 100%);
      color: #566148;
      font-weight: 700;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      position: sticky;
      top: 0;
      z-index: 1;
      white-space: nowrap;
    }

    tbody tr {
      transition: background 120ms;
    }

    tbody tr:nth-child(odd) td {
      background: #fff;
    }

    tbody tr:nth-child(even) td {
      background: #fcf9f1;
    }

    tbody tr:hover td {
      background: #eef6f0;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .status-badge {
      display: inline-flex;
      padding: 5px 12px;
      border-radius: 999px;
      font-size: 0.80rem;
      font-weight: 700;
      border: 1px solid;
      white-space: nowrap;
    }

    .status-badge.borrowed {
      color: #1f6d3a;
      background: #e8f7ec;
      border-color: #b8e2c4;
    }

    .status-badge.returned {
      color: #666;
      background: #f5f3ed;
      border-color: #ddd3c8;
    }

    .status-badge.overdue {
      color: #8c6211;
      background: #fff5df;
      border-color: #f2dfb5;
    }

    .btn-return {
      border: 0;
      border-radius: 8px;
      padding: 6px 12px;
      color: #fff;
      background: #7d8674;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.8rem;
      transition: background 180ms;
    }

    .btn-return:hover:not(:disabled) {
      background: #656d5c;
    }

    .btn-return:active:not(:disabled) {
      transform: scale(0.96);
    }

    .btn-return:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .empty {
      color: var(--subtle);
      margin: 20px 0 0;
      padding: 20px;
      text-align: center;
      font-size: 0.95rem;
    }

    @media (max-width: 1024px) {
      .stats {
        grid-template-columns: repeat(2, 1fr);
      }

      th,
      td {
        padding: 10px 8px;
        font-size: 0.88rem;
      }

      .toolbar input,
      .toolbar select {
        min-width: 130px;
        font-size: 0.9rem;
      }
    }

    @media (max-width: 768px) {
      .container {
        width: min(100%, 96vw);
        margin: 20px auto;
      }

      .card {
        padding: 14px;
        margin-bottom: 12px;
      }

      h1 {
        font-size: 1.4rem;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .toolbar {
        flex-direction: column;
        gap: 8px;
      }

      .toolbar input,
      .toolbar select,
      .toolbar button {
        width: 100%;
      }

      .responsive-wrap {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }

      table {
        min-width: 900px;
      }

      th,
      td {
        padding: 9px 8px;
        font-size: 0.84rem;
      }

      .btn-return {
        padding: 5px 10px;
        font-size: 0.75rem;
      }
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 1.2rem;
      }

      .admin-nav a {
        padding: 6px 10px;
        font-size: 0.8rem;
      }

      table {
        min-width: 650px;
      }

      th,
      td {
        padding: 8px 6px;
        font-size: 0.80rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="card">
      <h1>借阅总览</h1>
      <p class="subtitle">管理图书借阅和归还记录</p>
      <nav class="admin-nav" aria-label="后台管理导航">
        <a href="/index.html">后台首页</a>
        <a href="/admin/books.html">图书编辑</a>
        <a href="/admin/book-upload.html">图书上传</a>
        <a class="active" href="/admin/borrows.html">借阅总览</a>
        <a href="/admin/announcements.html">公告管理</a>
        <a href="/admin/reviews.html">评论总览</a>
        <a href="/admin/users.html">管理员管理</a>
      </nav>

      <div class="stats">
        <div class="stat-box">
          <div class="stat-label">借阅中</div>
          <p class="stat-value" id="stat-borrowed">0</p>
        </div>
        <div class="stat-box">
          <div class="stat-label">逾期</div>
          <p class="stat-value" id="stat-overdue">0</p>
        </div>
        <div class="stat-box">
          <div class="stat-label">已归还</div>
          <p class="stat-value" id="stat-returned">0</p>
        </div>
        <div class="stat-box">
          <div class="stat-label">全部</div>
          <p class="stat-value" id="stat-total">0</p>
        </div>
      </div>

      <div class="toolbar">
        <input id="keyword" type="search" placeholder="搜索用户名、书名、作者" />
        <select id="statusFilter">
          <option value="ALL">全部状态</option>
          <option value="BORROWED">借阅中</option>
          <option value="OVERDUE">逾期</option>
          <option value="RETURNED">已归还</option>
        </select>
        <button id="refreshBtn" type="button">刷新</button>
        <p id="status" class="status"></p>
      </div>

      <div class="table-wrap">
        <div class="responsive-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>用户名</th>
                <th>书名</th>
                <th>作者</th>
                <th>借出时间</th>
                <th>应还时间</th>
                <th>归还时间</th>
                <th>状态</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="recordList"></tbody>
          </table>
        </div>
      </div>
      <p id="empty" class="empty" hidden>暂无借阅记录</p>
    </section>
  </div>

  <script src="/js/auth.js"></script>
  <script>
    const AUTH = window.Demo5Auth;
    const adminHeaders = () => AUTH.buildAuthHeaders(AUTH.getStoredUser());
    AUTH.requireAdminPage();

    const keywordEl = document.getElementById('keyword');
    const statusFilterEl = document.getElementById('statusFilter');
    const refreshBtn = document.getElementById('refreshBtn');
    const statusEl = document.getElementById('status');
    const recordListEl = document.getElementById('recordList');
    const emptyEl = document.getElementById('empty');

    const statBorrowedEl = document.getElementById('stat-borrowed');
    const statOverdueEl = document.getElementById('stat-overdue');
    const statReturnedEl = document.getElementById('stat-returned');
    const statTotalEl = document.getElementById('stat-total');

    let records = [];

    function updateStats() {
      const borrowed = records.filter(r => r.status === 'BORROWED').length;
      const overdue = records.filter(r => r.status === 'OVERDUE').length;
      const returned = records.filter(r => r.status === 'RETURNED').length;
      const total = records.length;

      statBorrowedEl.textContent = borrowed;
      statOverdueEl.textContent = overdue;
      statReturnedEl.textContent = returned;
      statTotalEl.textContent = total;
    }

    function setStatus(message, isError) {
      statusEl.textContent = message || '';
      statusEl.className = isError ? 'status error' : 'status ok';
    }

    function escapeHtml(text) {
      return String(text || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function formatTime(value) {
      if (!value) {
        return '-';
      }
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) {
        return value;
      }
      return date.toLocaleString('zh-CN', { hour12: false });
    }

    function statusLabel(status) {
      if (status === 'BORROWED') return '借阅中';
      if (status === 'RETURNED') return '已归还';
      if (status === 'OVERDUE') return '逾期';
      return status;
    }

    function statusClass(status) {
      if (status === 'BORROWED') return 'borrowed';
      if (status === 'RETURNED') return 'returned';
      if (status === 'OVERDUE') return 'overdue';
      return '';
    }

    function filteredRecords() {
      const keyword = keywordEl.value.trim().toLowerCase();
      const statusFilter = statusFilterEl.value;
      return records.filter((item) => {
        if (statusFilter !== 'ALL' && item.status !== statusFilter) {
          return false;
        }
        if (!keyword) {
          return true;
        }
        const username = String(item.username || '').toLowerCase();
        const title = String(item.bookTitle || '').toLowerCase();
        const author = String(item.bookAuthor || '').toLowerCase();
        return username.includes(keyword) || title.includes(keyword) || author.includes(keyword);
      });
    }

    function render() {
      const list = filteredRecords();
      recordListEl.innerHTML = '';
      emptyEl.hidden = list.length !== 0;

      list.forEach((item) => {
        const tr = document.createElement('tr');
        const canForceReturn = item.status === 'BORROWED' || item.status === 'OVERDUE';
        tr.innerHTML = `
          <td>${item.id}</td>
          <td>${escapeHtml(item.username)}</td>
          <td>${escapeHtml(item.bookTitle)}</td>
          <td>${escapeHtml(item.bookAuthor)}</td>
          <td>${formatTime(item.borrowedAt)}</td>
          <td>${formatTime(item.dueDate)}</td>
          <td>${formatTime(item.returnedAt)}</td>
          <td><span class="status-badge ${statusClass(item.status)}">${statusLabel(item.status)}</span></td>
          <td>
            ${canForceReturn ? `<button class="btn-return" data-id="${item.id}">强制归还</button>` : '—'}
          </td>
        `;
        recordListEl.appendChild(tr);
      });
    }

    async function loadRecords() {
      try {
        const res = await fetch('/api/admin/borrows', {
          headers: adminHeaders()
        });
        if (!res.ok) {
          throw new Error('借阅记录加载失败');
        }
        const data = await res.json();
        records = Array.isArray(data) ? data : [];
        updateStats();
        render();
        setStatus(`共 ${records.length} 条记录`, false);
      } catch (error) {
        records = [];
        updateStats();
        render();
        setStatus('加载失败，请稍后重试', true);
      }
    }

    recordListEl.addEventListener('click', async (event) => {
      const button = event.target.closest('.btn-return');
      if (!button) {
        return;
      }
      const id = button.getAttribute('data-id');
      if (!id) {
        return;
      }
      button.disabled = true;
      try {
        const res = await fetch(`/api/admin/borrow/${id}/return`, {
          method: 'POST',
          headers: adminHeaders()
        });
        const data = await res.json();
        if (!res.ok) {
          setStatus(data.message || '操作失败', true);
          button.disabled = false;
          return;
        }
        setStatus(data.message || '归还成功', false);
        await loadRecords();
      } catch (error) {
        setStatus('请求失败，请稍后重试', true);
        button.disabled = false;
      }
    });

    keywordEl.addEventListener('input', render);
    statusFilterEl.addEventListener('change', render);
    refreshBtn.addEventListener('click', loadRecords);

    loadRecords();
  </script>
</body>
</html>
